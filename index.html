    <script>
        (function() {
            const HASH = '8105a2e317c2cb234eb4c886040b30f658154ffede98310b4d030351bb069c31';
            const saved = sessionStorage.getItem('auth');
            if (saved === HASH) return;

            async function sha256(str) {
                const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
                return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
            }

            document.addEventListener('DOMContentLoaded', function() {
                const overlay = document.createElement('div');
                overlay.id = 'authOverlay';
                overlay.style.cssText = 'position:fixed;inset:0;background:#1e293b;z-index:9999;display:flex;align-items:center;justify-content:center;';
                overlay.innerHTML = `
                    <div style="background:white;padding:2rem;border-radius:1rem;width:320px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5);">
                        <div style="font-size:2rem;margin-bottom:0.5rem;">🔒</div>
                        <h2 style="font-weight:bold;font-size:1.2rem;margin-bottom:1.5rem;color:#1e293b;">비밀번호를 입력하세요</h2>
                        <input id="pwInput" type="password" placeholder="비밀번호" style="width:100%;padding:0.6rem 1rem;border:1px solid #cbd5e1;border-radius:0.5rem;font-size:1rem;outline:none;box-sizing:border-box;" />
                        <p id="pwError" style="color:#ef4444;font-size:0.85rem;margin-top:0.5rem;min-height:1.2rem;"></p>
                        <button id="pwBtn" style="width:100%;margin-top:0.5rem;padding:0.6rem;background:#2563eb;color:white;border:none;border-radius:0.5rem;font-size:1rem;font-weight:bold;cursor:pointer;">확인</button>
                    </div>`;
                document.body.appendChild(overlay);

                async function tryAuth() {
                    const val = document.getElementById('pwInput').value;
                    const hashed = await sha256(val);
                    if (hashed === HASH) {
                        sessionStorage.setItem('auth', HASH);
                        overlay.remove();
                    } else {
                        document.getElementById('pwError').textContent = '비밀번호가 틀렸습니다.';
                        document.getElementById('pwInput').value = '';
                        document.getElementById('pwInput').focus();
                    }
                }
                document.getElementById('pwBtn').addEventListener('click', tryAuth);
                document.getElementById('pwInput').addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') tryAuth();
                });
                document.getElementById('pwInput').focus();
            });
        })();
    </script>

    <script>
        // --- 1. 데이터 설정 및 가공 ---
        
        // 공공데이터 API를 직접 호출하면 CORS 에러가 날 수 있습니다.
        // 실제 운영 시에는 백엔드 서버(Proxy)를 거치거나 CORS가 허용된 환경에서 사용해야 합니다.
        // 여기서는 동작 확인을 위해 행정안전부 담배소매업 데이터 형태를 본뜬 Mock 데이터를 사용합니다.
        const mockApiData = [
            { bplcNm: "세븐일레븐 서울역점", dtlStateNm: "영업", siteWhlAddr: "서울특별시 중구 봉래동2가 122", apvDt: "2021-05-10", clgDt: "", x: 126.9706, y: 37.5546 },
            { bplcNm: "행운담배가게", dtlStateNm: "폐업", siteWhlAddr: "서울특별시 중구 봉래동2가 122", apvDt: "2015-02-11", clgDt: "2021-04-30", x: 126.9706, y: 37.5546 }, // 동일 주소
            { bplcNm: "CU 남대문점", dtlStateNm: "영업", siteWhlAddr: "서울특별시 중구 남대문로 1", apvDt: "2022-01-15", clgDt: "", x: 126.9768, y: 37.5599 },
            { bplcNm: "세븐일레븐 명동역점", dtlStateNm: "폐업", siteWhlAddr: "서울특별시 중구 충무로2가 65-9", apvDt: "2018-09-20", clgDt: "2023-01-10", x: 126.9858, y: 37.5612 },
            { bplcNm: "GS25 명동역점", dtlStateNm: "영업", siteWhlAddr: "서울특별시 중구 충무로2가 65-9", apvDt: "2023-01-15", clgDt: "", x: 126.9858, y: 37.5612 }, // 동일 주소 이력
            { bplcNm: "가로수길 담배", dtlStateNm: "폐업", siteWhlAddr: "서울특별시 강남구 신사동 538", apvDt: "2010-06-05", clgDt: "2019-12-31", x: 127.0225, y: 37.5198 },
            { bplcNm: "세븐일레븐 신사점", dtlStateNm: "영업", siteWhlAddr: "서울특별시 강남구 신사동 538", apvDt: "2020-01-10", clgDt: "", x: 127.0225, y: 37.5198 }, // 동일 주소 세븐일레븐
            { bplcNm: "옛날담배방", dtlStateNm: "폐업", siteWhlAddr: "서울특별시 용산구 한강대로 100", apvDt: "2005-01-01", clgDt: "2010-12-31", x: 126.9697, y: 37.5271 } // 폐업만 있는 곳 테스트용
        ];

        let map;
        let markers = [];
        let groupedData = {};
        
        // 직접 입력해주신 카카오 JavaScript API 키
        const KAKAO_API_KEY = '21792ed90da16b4da6ab0d8978b26cd1';
        
        // 공공데이터 API 설정
        const PUBLIC_DATA_API_KEY = 'e73f0e74186728df4cc7a0b30825e3b65e04519363781be92faa5511083d30d8';
        const PUBLIC_DATA_ENDPOINT = 'https://apis.data.go.kr/1741000/tobacco_retailers/info';

        // --- 2. 초기화 및 스크립트 로드 ---

        function showDomainError() {
            document.getElementById('errorMessage').innerHTML = '카카오 지도 보안 정책(도메인 미등록)으로 인해 현재 Canvas 미리보기 화면에서는 지도가 차단되었습니다.<br><br>작성된 코드는 정상이며, <b>깃허브(ooooogoon.github.io)</b>에 업로드하시거나 <b>로컬 웹 서버(localhost)</b>에서 실행하시면 지도가 완벽하게 나타납니다!';
            document.getElementById('errorModal').classList.remove('hidden');
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('map').innerHTML = '<div class="text-center"><i class="fa-solid fa-map-location-dot text-4xl mb-3 text-gray-300"></i><p>카카오 지도 정책에 의해<br>미리보기가 차단되었습니다.</p></div>';
        }

        let currentRegion = '';

        // 시/도 이름 → 개방자치단체코드(_ALL) 매핑
        const REGION_CODES = {
            '서울특별시': '6110000_ALL',
            '부산광역시': '6260000_ALL',
            '대구광역시': '6270000_ALL',
            '인천광역시': '6280000_ALL',
            '광주광역시': '6290000_ALL',
            '대전광역시': '6300000_ALL',
            '울산광역시': '6310000_ALL',
            '세종특별자치시': '5690000_ALL',
            '경기도':     '6410000_ALL',
            '강원도':     '6530000_ALL',
            '강원특별자치도': '6530000_ALL',
            '충청북도':   '6430000_ALL',
            '충청남도':   '6440000_ALL',
            '전라북도':   '6540000_ALL',
            '전북특별자치도': '6540000_ALL',
            '전라남도':   '6460000_ALL',
            '경상북도':   '6470000_ALL',
            '경상남도':   '6480000_ALL',
            '제주특별자치도': '6500000_ALL',
        };

        function initializeApp() {
            document.getElementById('loading').classList.remove('hidden');

            const script = document.createElement('script');
            script.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_API_KEY}&libraries=services&autoload=false`;

            script.onload = () => {
                try {
                    kakao.maps.load(() => {
                        try {
                            initMap();
                            setTimeout(() => {
                                const mapContainer = document.getElementById('map');
                                if(mapContainer.childElementCount === 0) showDomainError();
                            }, 1000);
                        } catch (err) {
                            showDomainError();
                        }
                    });
                } catch (e) {
                    showDomainError();
                }
            };

            script.onerror = () => { showDomainError(); };
            document.head.appendChild(script);
        }

        function initMap() {
            const container = document.getElementById('map');
            map = new kakao.maps.Map(container, {
                center: new kakao.maps.LatLng(37.5546, 126.9706),
                level: 6
            });

            const zoomControl = new kakao.maps.ZoomControl();
            map.addControl(zoomControl, kakao.maps.ControlPosition.RIGHT);

            // 현재 위치로 초기화
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        map.setCenter(new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude));
                        map.setLevel(5);
                        detectRegionAndLoad(pos.coords.latitude, pos.coords.longitude);
                    },
                    () => detectRegionAndLoad(37.5546, 126.9706) // 거부시 서울 기본값
                );
            } else {
                detectRegionAndLoad(37.5546, 126.9706);
            }

            // 지도 이동 후 새 지역 데이터 로드
            kakao.maps.event.addListener(map, 'idle', () => {
                const c = map.getCenter();
                detectRegionAndLoad(c.getLat(), c.getLng());
            });
        }

        function detectRegionAndLoad(lat, lng) {
            const geocoder = new kakao.maps.services.Geocoder();
            geocoder.coord2RegionCode(lng, lat, (result, status) => {
                if (status === kakao.maps.services.Status.OK) {
                    // 시/도 단위로 필터 (서울특별시, 부산광역시 등)
                    const region = result[0].region_1depth_name;
                    fetchDataForRegion(region);
                }
            });
        }

        function clearMarkers() {
            markers.forEach(m => m.setMap(null));
            markers = [];
            groupedData = {};
        }

        // --- 3. 데이터 처리 및 마커 생성 ---

        function processAndDisplayData(dataList) {
            const newGroups = {};
            dataList.forEach(current => {
                // 주소 없으면 좌표를 key로 사용
                const address = current.siteWhlAddr || `${current.y?.toFixed(5)},${current.x?.toFixed(5)}`;
                if (!address) return;
                if (!groupedData[address]) {
                    groupedData[address] = [];
                    newGroups[address] = groupedData[address];
                }
                groupedData[address].push(current);
                newGroups[address] = groupedData[address];
            });

            createMarkers(newGroups);
            document.getElementById('loading').classList.add('hidden');

        }

        function createMarkers(grouped) {
            // SVG 커스텀 마커 이미지 생성 헬퍼 함수
            const createMarkerImg = (color, iconSvg) => {
                const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="35" viewBox="0 0 24 35"><path fill="${color}" d="M12 0C5.4 0 0 5.4 0 12c0 9 12 23 12 23s12-14 12-23c0-6.6-5.4-12-12-12z"/>${iconSvg}</svg>`;
                const encoded = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
                return new kakao.maps.MarkerImage(encoded, new kakao.maps.Size(24, 35), {offset: new kakao.maps.Point(12, 35)});
            };

            const imgSevenEleven = createMarkerImg('#f97316', '<path fill="#fff" d="M12 6l1.8 5.5h5.8l-4.7 3.4 1.8 5.5-4.7-3.4-4.7 3.4 1.8-5.5-4.7-3.4h5.8z"/>'); // 오렌지색 별
            const imgOperating = createMarkerImg('#3b82f6', '<circle cx="12" cy="12" r="5" fill="#fff"/>'); // 파란색 동그라미
            const imgClosed = createMarkerImg('#9ca3af', '<rect x="7" y="10.5" width="10" height="3" fill="#fff"/>'); // 회색 빼기 기호

            for (const address in grouped) {
                const historyList = grouped[address];
                
                // 1. "세븐일레븐 XX점" 패턴 매칭 (최우선)
                const hasSevenEleven = historyList.some(store => /^세븐일레븐\s*.+점$/.test(store.bplcNm));
                
                // 2. 현재 해당 주소에 '영업' 중인 담배소매업이 있는지 (폐업만 있는지 확인용)
                const isOperating = historyList.some(store => store.dtlStateNm.includes('영업') || store.dtlStateNm.includes('정상'));
                
                // 좌표는 그룹 내 첫 번째 데이터의 좌표를 사용
                const lat = historyList[0].y;
                const lng = historyList[0].x;
                const position = new kakao.maps.LatLng(lat, lng);

                const markerOptions = {
                    position: position,
                    map: map,
                    title: address // 마커 호버 툴팁
                };

                // 상태에 따른 마커 지정 로직 (우선순위 적용)
                if (hasSevenEleven) {
                    markerOptions.image = imgSevenEleven;
                    markerOptions.zIndex = 30;
                } else if (isOperating) {
                    markerOptions.image = imgOperating;
                    markerOptions.zIndex = 20;
                } else {
                    markerOptions.image = imgClosed;
                    markerOptions.zIndex = 10;
                }

                const marker = new kakao.maps.Marker(markerOptions);
                markers.push(marker);

                // 마커 클릭 이벤트: 사이드바에 히스토리 표시
                kakao.maps.event.addListener(marker, 'click', function() {
                    openSidebar(address, historyList);
                    map.panTo(position);
                });
            }
        }

        // --- 4. UI 상호작용 (사이드바 히스토리) ---

        function openSidebar(address, historyList) {
            const sidebar = document.getElementById('sidebar');
            const addressEl = document.getElementById('selectedAddress');
            const historyContainer = document.getElementById('historyList');

            addressEl.textContent = address;
            historyContainer.innerHTML = ''; // 초기화

            // 날짜 최신순으로 정렬 (폐업일 또는 인허가일 기준)
            const sortedHistory = [...historyList].sort((a, b) => {
                const dateA = a.clgDt || a.apvDt;
                const dateB = b.clgDt || b.apvDt;
                return new Date(dateB) - new Date(dateA);
            });

            sortedHistory.forEach((store, index) => {
                const isOperating = store.dtlStateNm === '영업';
                const statusColor = isOperating ? 'text-green-600 bg-green-100 border-green-200' : 'text-red-600 bg-red-100 border-red-200';
                const isSevenEleven = store.bplcNm.includes('세븐일레븐');
                
                const card = document.createElement('div');
                card.className = `p-4 mb-4 rounded-lg border shadow-sm relative overflow-hidden ${isSevenEleven ? 'border-orange-300 bg-orange-50' : 'bg-white border-gray-100'}`;
                
                // 타임라인 연결선 (마지막 항목 제외)
                if (index < sortedHistory.length - 1) {
                    const line = document.createElement('div');
                    line.className = 'absolute bottom-0 left-8 w-0.5 h-4 bg-gray-200 translate-y-full';
                    card.appendChild(line);
                }

                let datesHtml = `<p class="text-sm text-gray-500 mt-2"><i class="fa-regular fa-calendar-check mr-1"></i>인허가: ${store.apvDt}</p>`;
                if (store.clgDt) {
                    datesHtml += `<p class="text-sm text-red-400 mt-1"><i class="fa-regular fa-calendar-xmark mr-1"></i>폐업일: ${store.clgDt}</p>`;
                }

                card.innerHTML += `
                    <div class="flex justify-between items-start">
                        <h4 class="font-bold text-gray-800 text-lg flex items-center">
                            ${isSevenEleven ? '<span class="text-orange-600 mr-1"><i class="fa-solid fa-store"></i></span>' : ''}
                            ${store.bplcNm}
                        </h4>
                        <span class="px-2.5 py-1 rounded-full text-xs font-bold border ${statusColor}">
                            ${store.dtlStateNm}
                        </span>
                    </div>
                    ${datesHtml}
                `;
                historyContainer.appendChild(card);
            });

            sidebar.classList.remove('sidebar-closed');
            sidebar.classList.add('sidebar-open');
        }

        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.remove('sidebar-open');
            sidebar.classList.add('sidebar-closed');
        }

        // --- 5. 공공데이터 API 연동 및 지오코딩 ---
        
        // 한국 TM 좌표계(EPSG:5174) 정의
        // 보정계수 안들어간 Bessel 중부원점TM (API 명세 기준)
        proj4.defs("EPSG:5174", "+proj=tmerc +lat_0=38 +lon_0=127 +k=1 +x_0=200000 +y_0=500000 +ellps=bessel +units=m +no_defs");

        function convertToWGS84(x, y) {
            const [lng, lat] = proj4("EPSG:5174", "WGS84", [x, y]);
            return { x: lng, y: lat };
        }

        function formatDate(ymd) {
            if (!ymd) return '';
            if (ymd.includes('-')) return ymd; // 이미 YYYY-MM-DD 형식
            if (ymd.length < 8) return ymd;
            return `${ymd.slice(0,4)}-${ymd.slice(4,6)}-${ymd.slice(6,8)}`;
        }

        async function fetchDataForRegion(region) {
            if (region === currentRegion) return;
            currentRegion = region;
            clearMarkers();

            const loadingEl = document.getElementById('loading');
            const loadingText = document.querySelector('#loading span');
            loadingEl.classList.remove('hidden');
            loadingText.textContent = `${region} 데이터 로드 중...`;

            try {
                const regionCode = REGION_CODES[region];
                if (!regionCode) { document.getElementById('loading').classList.add('hidden'); return; }
                const url = `${PUBLIC_DATA_ENDPOINT}?serviceKey=${PUBLIC_DATA_API_KEY}&pageNo=1&numOfRows=100&returnType=json&cond[OPN_ATMY_GRP_CD::EQ]=${regionCode}`;
                console.log('[D] 요청URL:', url.replace(PUBLIC_DATA_API_KEY, 'KEY'));

                const response = await fetch(url);
                if (!response.ok) throw new Error('네트워크 응답 에러');

                const data = await response.json();

                let items = [];
                if (data.response && data.response.body && data.response.body.items) {
                    items = data.response.body.items;
                    if (items.item) items = Array.isArray(items.item) ? items.item : [items.item];
                }
                console.log('[D] 응답 items 수:', items.length, '/ totalCount:', data.response?.body?.totalCount);

                if (items && items.length > 0) {
                    loadingText.textContent = `API 데이터 ${items.length}건 로드 중...`;

                    const withCoords = [];   // TM좌표 변환으로 즉시 표시
                    const needsGeocode = []; // 좌표 없어서 주소 지오코딩 필요

                    items.forEach(item => {
                        const base = {
                            bplcNm: item.BPLC_NM || '알수없음',
                            dtlStateNm: item.DTL_SALS_STTS_NM || item.SALS_STTS_NM || '상태없음',
                            siteWhlAddr: item.ROAD_NM_ADDR || item.LOTNO_ADDR || '',
                            apvDt: formatDate(item.LCPMT_YMD),
                            clgDt: formatDate(item.CLSBIZ_YMD),
                        };

                        if (item.CRD_INFO_X && item.CRD_INFO_Y) {
                            // 좌표 있으면 TM→WGS84 변환 후 즉시 표시
                            const coords = convertToWGS84(parseFloat(item.CRD_INFO_X), parseFloat(item.CRD_INFO_Y));
                            withCoords.push({ ...base, x: coords.x, y: coords.y });
                        } else if (base.siteWhlAddr) {
                            // 좌표 없고 주소 있으면 지오코딩
                            needsGeocode.push(base);
                        }
                    });

                    // 좌표 있는 것 즉시 표시
                    if (withCoords.length > 0) processAndDisplayData(withCoords);

                    // 좌표 없는 것만 주소로 지오코딩
                    if (needsGeocode.length > 0) {
                        document.getElementById('loading').classList.remove('hidden');
                        const geocoder = new kakao.maps.services.Geocoder();
                        let done = 0;
                        for (const item of needsGeocode) {
                            await new Promise(resolve => {
                                geocoder.addressSearch(item.siteWhlAddr, function(result, status) {
                                    if (status === kakao.maps.services.Status.OK) {
                                        item.x = parseFloat(result[0].x);
                                        item.y = parseFloat(result[0].y);
                                        processAndDisplayData([item]);
                                    }
                                    done++;
                                    loadingText.textContent = `주소 변환 중... (${done}/${needsGeocode.length})`;
                                    resolve();
                                });
                            });
                        }
                        document.getElementById('loading').classList.add('hidden');
                    }

                    if (withCoords.length === 0 && needsGeocode.length === 0) {
                        throw new Error('표시할 데이터가 없습니다.');
                    }
                } else {
                    throw new Error('조회된 데이터가 없습니다.');
                }
            } catch (error) {
                console.warn("API 호출 실패:", error);
                loadingEl.classList.add('hidden');
            }
        }

        // 페이지가 로드되면 자동으로 앱 초기화 실행
        window.addEventListener('DOMContentLoaded', initializeApp);

    </script>
</body>
